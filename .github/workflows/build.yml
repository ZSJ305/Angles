name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Archive
        run: |
          xcodebuild \
            -project Angles.xcodeproj \
            -target Angles \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            CONFIGURATION_BUILD_DIR=./build/Release-iphoneos \
            build 2>&1

      - name: Create IPA
        run: |
          cp -R ./build/Release-iphoneos/Angles.app ./Angles.app
          mkdir -p Payload
          cp -R Angles.app Payload/
          zip -r Angles.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Angles.ipa
          path: Angles.ipa